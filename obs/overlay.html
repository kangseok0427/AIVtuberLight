<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="1">
<style>
  body {
    background: transparent;
    margin: 0;
    padding: 20px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  #chat-box {
    background: rgba(0, 0, 0, 0.6);
    border-radius: 12px;
    padding: 16px 20px;
    max-width: 600px;
    border-left: 4px solid #a78bfa;
  }
  #name {
    color: #a78bfa;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 6px;
  }
  #message {
    color: #ffffff;
    font-size: 20px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div id="chat-box">
  <div id="name">가온</div>
  <div id="message">고점매수저점매도달인, 예전에 잠깐 했었어! 뱀이 먹이를 먹으면서 몸길이를 늘려가는 아주 클래식한 게임이야 🐍</div>
</div>
</body>
</html>
